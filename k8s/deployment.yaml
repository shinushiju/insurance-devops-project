apiVersion: apps/v1
kind: Deployment

metadata:
  name: insurance-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: insurance

  template:
    metadata:
      labels:
        app: insurance

    spec:
      containers:
        - name: insurance

          image: shinushiju/insurance-app:latest

          ports:
          - containerPort: 5000
